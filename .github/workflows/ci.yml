name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ 安装 uv
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      # 4️⃣ 使用 uv 安装项目依赖
      - name: Install project dependencies with uv
        run: |
          uv sync      # uv 会根据 pyproject.toml + uv.lock 安装依赖

      # 5️⃣ 质量门禁（格式/Lint/类型）
      - name: Quality gate
        run: make quality

      # 6️⃣ 单元测试 + 覆盖率
      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=60

      # 7️⃣ 系统自检（部署前标准检查）
      - name: System check
        run: make system-check

      - name: Upload coverage artifacts
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

      - name: Build coverage summary
        if: github.event_name == 'pull_request' && hashFiles('coverage.xml') != ''
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request' && hashFiles('code-coverage-results.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

#      # 9️⃣ 数据库迁移文件检查
#      - name: Migration files check
#        run: test -f migrations/alembic.ini && echo "✓ Migration setup verified"

      # 🔟 构建 Docker 镜像
      - name: Build Docker image
        run: docker build -t flask_py:latest .
